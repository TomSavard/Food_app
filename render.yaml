services:
  - type: web
    name: food-app-backend
    env: python
    buildCommand: pip install -r requirements_backend.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Set this manually in Render dashboard
    healthCheckPath: /health

