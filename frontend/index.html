<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestionnaire de recettes et planification de menus">
    <meta name="theme-color" content="#4CAF50">
    <title>Food App - Mes Recettes</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/icon-192.png">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <h1 class="logo">🍽️ Food App</h1>
            <button class="btn-icon" id="addRecipeBtn" aria-label="Ajouter une recette">
                <span>+</span>
            </button>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
        <div class="container">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Rechercher une recette..."
                autocomplete="off"
            >
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Toutes</button>
                <button class="filter-btn" data-filter="plat">Plats</button>
                <button class="filter-btn" data-filter="dessert">Desserts</button>
                <button class="filter-btn" data-filter="entrée">Entrées</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Loading State -->
            <div id="loadingState" class="loading">
                <div class="spinner"></div>
                <p>Chargement des recettes...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="error-state" style="display: none;">
                <p>❌ Erreur lors du chargement des recettes</p>
                <button class="btn-primary" onclick="loadRecipes()">Réessayer</button>
            </div>

            <!-- Recipe List -->
            <div id="recipeList" class="recipe-grid"></div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <p>🔍 Aucune recette trouvée</p>
            </div>
        </div>
    </main>

    <!-- Recipe Detail Modal -->
    <div id="recipeModal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <div id="recipeDetail"></div>
        </div>
    </div>

    <!-- Add Recipe Modal -->
    <div id="addRecipeModal" class="modal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" id="closeAddModal">&times;</button>
            <h2>Nouvelle Recette</h2>
            <form id="recipeForm">
                <div class="form-group">
                    <label for="recipeName">Nom de la recette *</label>
                    <input type="text" id="recipeName" required>
                </div>
                <div class="form-group">
                    <label for="recipeDescription">Description</label>
                    <textarea id="recipeDescription" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="prepTime">Temps de préparation (min)</label>
                        <input type="number" id="prepTime" min="0" value="0">
                    </div>
                    <div class="form-group">
                        <label for="cookTime">Temps de cuisson (min)</label>
                        <input type="number" id="cookTime" min="0" value="0">
                    </div>
                    <div class="form-group">
                        <label for="servings">Portions</label>
                        <input type="number" id="servings" min="1" value="1">
                    </div>
                </div>
                <div class="form-group">
                    <label for="cuisineType">Type de cuisine</label>
                    <input type="text" id="cuisineType">
                </div>
                
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label>Ingrédients</label>
                        <button type="button" class="btn-small" onclick="addIngredientField()">+ Ajouter</button>
                    </div>
                    <div id="ingredientsContainer"></div>
                </div>
                
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label>Instructions</label>
                        <button type="button" class="btn-small" onclick="addInstructionField()">+ Ajouter</button>
                    </div>
                    <div id="instructionsContainer"></div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Enregistrer</button>
                    <button type="button" class="btn-secondary" id="cancelAdd">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed'));
            });
        }
    </script>
</body>
</html>
